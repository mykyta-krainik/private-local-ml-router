services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  ollama-pull:
    image: ollama/ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull"]
    command: ["${OLLAMA_MODEL:-gemma2:4b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  vision-server:
    build:
      context: vision-server
    ports:
      - "5000:5000"
    volumes:
      # Populated by `make train-visual`; falls back to pretrained yolov8n if absent
      - ./training/runs/detect/yolov8n_pii/weights:/models:ro
    environment:
      CONF_THRESHOLD: "0.45"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: demo-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:4b}
      VISUAL_DETECTION_URL: http://vision-server:5000
      # CLOUD_API_KEY: your-key-here
      # CLOUD_API_URL: https://api.openai.com/v1/chat/completions
    depends_on:
      ollama:
        condition: service_healthy
      vision-server:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://server:8080
    command: sh -c "npm install && npm run dev"
    depends_on:
      - server

volumes:
  ollama_data:
  frontend_nm:
