services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  ollama-pull:
    image: ollama/ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull"]
    command: ["${OLLAMA_MODEL:-gemma2:4b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: demo-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:4b}
      # CLOUD_API_KEY: your-key-here
      # CLOUD_API_URL: https://api.openai.com/v1/chat/completions
      # VISUAL_DETECTION_URL: http://your-vision-server:5000
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://server:8080
    command: sh -c "npm install && npm run dev"
    depends_on:
      - server

volumes:
  ollama_data:
  frontend_nm:
